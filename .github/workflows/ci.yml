name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  compliance:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Ban AI-authored commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags --no-recurse-submodules origin "$BASE_SHA"
          offenders=$(git log --no-merges --pretty=format:'%H %an <%ae> committed by %cn <%ce>' "$BASE_SHA".."$HEAD_SHA" \
            | grep -iE '(claude|codex)' || true)
          if [ -n "$offenders" ]; then
            echo "Commits authored or committed by Claude or Codex are not allowed:"
            echo "$offenders"
            exit 1
          fi
      - name: Non ASCII characters
        run: |
          if grep -P -n "[^\x00-\x7F]" -r --include="*.rs" --include="*.toml" --include="*.js" --exclude-dir=.git .; then
            echo "Non-ASCII characters detected"
            exit 1
          fi

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        run: cargo install --force --version 1.49.0 just --locked
      - name: Install Rust MSRV
        run: |
          rustup toolchain install 1.85.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.85.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ runner.arch }}-rust-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
      - name: Run checks and tests
        run: just test
